<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerebro CRM — Reporting</title>
<script src="auth.js"></script>
<style>
  :root {
    --blue: #3b6b9a;
    --blue-light: #e8f0f8;
    --green: #3a8a6e;
    --green-light: #e6f4ef;
    --amber: #d4813e;
    --amber-light: #fdf0e4;
    --purple: #7c6b9e;
    --purple-light: #f0ecf6;
    --teal: #5a9ea6;
    --teal-light: #e6f3f5;
    --red: #c4524a;
    --red-light: #fbe9e8;
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #2d3748;
    --text-secondary: #5a6577;
    --text-muted: #94a0b4;
    --border: #e2e6ed;
    --header-bg: #1e2a3a;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-hover: 0 6px 20px rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* === TOP BAR === */
  .topbar {
    background: var(--header-bg);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 24px; }
  .topbar .nav-item {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 4px 0;
  }
  .topbar .nav-item.active { color: #fff; border-bottom: 2px solid var(--amber); }
  .topbar-search {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 6px 14px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    width: 200px;
    outline: none;
  }
  .topbar-search::placeholder { color: rgba(255,255,255,0.35); }

  /* === PAGE HEADER === */
  .page-header {
    padding: 28px 32px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .page-header h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .page-header .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* === STAT CARDS === */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 20px 32px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* === REPORT GRID === */
  .report-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 8px 32px 48px;
  }
  .report-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s, border-color 0.2s;
    position: relative;
    min-height: 180px;
  }
  .report-card:hover {
    box-shadow: var(--shadow-hover);
    border-color: #c8d0db;
  }
  .report-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .report-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .report-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .report-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    flex: 1;
  }
  .report-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }
  .category-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .badge-executive { background: var(--blue-light); color: var(--blue); }
  .badge-sales { background: var(--green-light); color: var(--green); }
  .badge-finance { background: var(--amber-light); color: var(--amber); }
  .badge-property { background: var(--teal-light); color: var(--teal); }
  .badge-insights { background: var(--red-light); color: var(--red); }
  .badge-archive { background: #f0f1f3; color: var(--text-muted); }
  .view-link {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  .view-link:hover { color: var(--blue); }
  .view-link .arrow { font-size: 14px; transition: transform 0.15s; }
  .view-link:hover .arrow { transform: translateX(3px); }

  @media (max-width: 900px) {
    .report-grid, .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .report-grid, .stats-row { grid-template-columns: 1fr; }
    .filter-bar { flex-wrap: wrap; }
    .filter-pills { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="#" class="nav-item active">Reporting</a>
  </div>
  <input type="text" class="topbar-search" placeholder="Search...">
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div>
    <h1>Reporting</h1>
  </div>
  <div class="subtitle">Access dashboards and analytics across your CRM data</div>
</div>

<!-- STAT CARDS -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-value">4</div>
    <div class="stat-label">Reports Available</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">Today</div>
    <div class="stat-label">Last Generated</div>
  </div>
  <div class="stat-card">
    <div class="stat-value">FY 2026</div>
    <div class="stat-label">Current Period</div>
  </div>
</div>

<!-- REPORT GRID -->
<div class="report-grid" id="reportGrid"></div>

<script>
const REPORTS = [
  {
    title: 'Executive Leadership',
    desc: 'Group-level overview across all business units — targets, closed revenue, pipeline, and achievement with drill-down to properties and deals',
    category: 'executive',
    iconSvg: '<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    iconBg: 'var(--blue-light)',
    iconColor: 'var(--blue)',
    href: 'Executive-Leadership-Dashboard.html'
  },
  {
    title: 'Business Unit',
    desc: 'Business unit and property performance — target vs closed charts, pipeline tracking, week-on-week analysis, and quarterly breakdown',
    category: 'sales',
    iconSvg: '<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    iconBg: 'var(--green-light)',
    iconColor: 'var(--green)',
    href: 'Business-Unit-Dashboard.html'
  },
  {
    title: 'Manager',
    desc: 'Manager-centric view — see your team, review individual sales performance, track targets and pipeline, with direct links to each individual dashboard',
    category: 'sales',
    iconSvg: '<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    iconBg: 'var(--purple-light)',
    iconColor: 'var(--purple)',
    href: 'Manager-Dashboard.html'
  },
  {
    title: 'Individual',
    desc: 'Individual view — personal targets by property, deal and opportunity pipeline, stage progression, and property-level performance',
    category: 'sales',
    iconSvg: '<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
    iconBg: 'var(--amber-light)',
    iconColor: 'var(--amber)',
    href: 'Individual-Dashboard.html'
  }
];

function renderGrid() {
  var grid = document.getElementById('reportGrid');
  grid.innerHTML = '';
  REPORTS.forEach(function(r) {
    var badgeClass = 'badge-' + r.category;
    var card = document.createElement('div');
    card.className = 'report-card';
    card.innerHTML =
      '<div class="report-card-top">' +
        '<div class="report-icon" style="background:' + r.iconBg + ';color:' + r.iconColor + '">' + r.iconSvg + '</div>' +
      '</div>' +
      '<div class="report-title">' + r.title + '</div>' +
      '<div class="report-desc">' + r.desc + '</div>' +
      '<div class="report-footer">' +
        '<span class="category-badge ' + badgeClass + '">' + r.category + '</span>' +
        '<a href="' + r.href + '" class="view-link">View Report <span class="arrow">&rarr;</span></a>' +
      '</div>';
    grid.appendChild(card);
  });
}

renderGrid();
</script>
</body>
</html>
