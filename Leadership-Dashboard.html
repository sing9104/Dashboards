<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerebro CRM — Business Unit Sales Report</title>

<style>
  :root {
    /* Professional corporate palette — slate blues with warm accents */
    --tableau-blue: #3b6b9a;
    --tableau-orange: #d4813e;
    --tableau-green: #3a8a6e;
    --tableau-red: #c4524a;
    --tableau-purple: #7c6b9e;
    --tableau-teal: #5a9ea6;
    --tableau-gold: #c9a84c;
    --tableau-brown: #8a6d5b;
    --color-success: #3a8a6e;
    --color-pipeline: #7c6b9e;
    --bg-primary: #f4f5f7;
    --bg-card: #ffffff;
    --bg-header: #1e2a3a;
    --text-primary: #2d3748;
    --text-secondary: #5a6577;
    --text-muted: #94a0b4;
    --border-color: #e2e6ed;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
    --radius: 6px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.4;
  }

  /* === TABLEAU TOP BAR === */
  .tableau-topbar {
    background: var(--bg-header);
    color: white;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-sm);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tableau-topbar .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .tableau-topbar .logo span { color: var(--tableau-orange); }
  .tableau-topbar .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-left: 12px;
  }
  .topbar-left { display: flex; align-items: center; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-right .year-toggle {
    display: flex;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }
  .year-toggle button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: var(--transition);
  }
  .year-toggle button.active {
    background: var(--tableau-blue);
    color: white;
  }
  .year-toggle button:hover:not(.active) {
    background: rgba(255,255,255,0.15);
    color: white;
  }

  /* === BREADCRUMB === */
  .breadcrumb-bar {
    background: white;
    border-bottom: 1px solid var(--border-color);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .breadcrumb-item {
    color: var(--tableau-blue);
    cursor: pointer;
    text-decoration: none;
    transition: var(--transition);
  }
  .breadcrumb-item:hover { text-decoration: underline; }
  .breadcrumb-sep { color: var(--text-muted); }
  .breadcrumb-current { color: var(--text-primary); font-weight: 600; }

  /* === MAIN CONTAINER === */
  .dashboard { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  /* === KPI STRIP === */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow-sm);
    border-top: 3px solid var(--tableau-blue);
    transition: var(--transition);
  }
  .kpi-card:hover { box-shadow: var(--shadow-md); }
  .kpi-card .kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .kpi-card .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .kpi-card .kpi-compare {
    font-size: 11px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .kpi-card .kpi-compare.up { color: var(--tableau-green); }
  .kpi-card .kpi-compare.down { color: var(--tableau-red); }
  .kpi-card:nth-child(2) { border-top-color: var(--tableau-orange); }
  .kpi-card:nth-child(3) { border-top-color: var(--tableau-green); }
  .kpi-card:nth-child(4) { border-top-color: var(--tableau-purple); }

  /* === SECTION TITLES === */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count-badge {
    background: var(--tableau-blue);
    color: white;
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    font-weight: 500;
  }

  /* === CHARTS AREA === */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 16px 20px;
    transition: var(--transition);
  }
  .chart-card:hover { box-shadow: var(--shadow-md); }
  .chart-card .chart-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 14px;
  }

  /* === BAR CHART (CSS) === */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row {
    display: grid;
    grid-template-columns: 120px 1fr 70px;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 3px;
    transition: var(--transition);
  }
  .bar-row:hover { background: #f0f4f8; }
  .bar-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    height: 22px;
    background: #eef1f5;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
    position: absolute;
    top: 0;
    left: 0;
  }
  .bar-fill.actual { background: var(--tableau-blue); z-index: 2; }
  .bar-fill.target {
    background: transparent;
    border-right: 2px dashed var(--tableau-orange);
    z-index: 3;
  }
  .bar-value {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: right;
  }

  /* === STACKED BAR (COMPOSITION) === */
  .stacked-bar-container { margin-top: 8px; }
  .stacked-bar {
    display: flex;
    height: 32px;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .stacked-segment {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: opacity var(--transition);
    position: relative;
  }
  .stacked-segment:hover { opacity: 0.85; }
  .stacked-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .legend-item:hover { color: var(--text-primary); }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* === DATA TABLE === */
  .data-table-wrapper {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .data-table-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .data-table-header .table-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  table.tableau-table {
    width: 100%;
    border-collapse: collapse;
  }
  table.tableau-table thead th {
    background: #f8f9fb;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 2px solid var(--border-color);
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  table.tableau-table thead th:hover { background: #eef1f5; }
  table.tableau-table thead th.num { text-align: right; }
  table.tableau-table tbody tr {
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background var(--transition);
  }
  table.tableau-table tbody tr:hover { background: #f0f6ff; }
  table.tableau-table tbody td {
    padding: 10px 16px;
    font-size: 12px;
  }
  table.tableau-table tbody td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  table.tableau-table tbody td .drill-icon {
    color: var(--tableau-blue);
    font-size: 10px;
    margin-left: 4px;
    opacity: 0;
    transition: opacity var(--transition);
  }
  table.tableau-table tbody tr:hover td .drill-icon { opacity: 1; }
  .variance-pos { color: var(--tableau-green); font-weight: 600; }
  .variance-neg { color: var(--tableau-red); font-weight: 600; }
  .attainment-bar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    width: 100%;
  }
  .attainment-track {
    flex: 1;
    height: 6px;
    background: #eef1f5;
    border-radius: 3px;
    overflow: hidden;
    min-width: 60px;
  }
  .attainment-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .attainment-pct { font-size: 11px; font-weight: 600; min-width: 36px; text-align: right; }

  /* === TOOLTIP === */
  .tooltip {
    display: none;
    position: fixed;
    background: rgba(44, 62, 80, 0.95);
    color: white;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 12px;
    z-index: 999;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
    max-width: 260px;
    line-height: 1.5;
  }
  .tooltip.visible { display: block; }
  .tooltip .tt-title { font-weight: 600; margin-bottom: 4px; }
  .tooltip .tt-row { display: flex; justify-content: space-between; gap: 20px; }
  .tooltip .tt-label { color: rgba(255,255,255,0.7); }
  .tooltip .tt-val { font-weight: 600; }

  /* === LEVEL TRANSITIONS === */
  .view-container { transition: opacity 0.3s ease; }
  .view-container.hidden { display: none; opacity: 0; }

  /* === FILTER BAR === */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition);
  }
  .filter-pill:hover { border-color: var(--tableau-blue); color: var(--tableau-blue); }
  .filter-pill.active {
    background: var(--tableau-blue);
    color: white;
    border-color: var(--tableau-blue);
  }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* === MINI SPARKLINE === */
  .sparkline {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 20px;
    vertical-align: middle;
  }
  .spark-bar {
    width: 4px;
    background: var(--tableau-blue);
    border-radius: 1px;
    opacity: 0.5;
  }
  .spark-bar:last-child { opacity: 1; }

  /* === BACK BUTTON === */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 16px;
  }
  .back-btn:hover {
    background: white;
    border-color: var(--tableau-blue);
    color: var(--tableau-blue);
  }

  /* === DEAL STATUS BADGES === */
  .deal-id-link {
    font-family: monospace;
    font-size: 11px;
    color: var(--tableau-blue);
    text-decoration: none;
    cursor: pointer;
  }
  .deal-id-link:hover {
    text-decoration: underline;
    color: #2c5f8a;
  }
  .deal-id-link .link-arrow { font-size: 9px; margin-left: 2px; opacity: 0.6; }
  .deal-id-link:hover .link-arrow { opacity: 1; }

  .deal-stage {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  /* Stage styling - new stage system */
  .deal-stage.closed100 { background: #e8f5e9; color: #2e7d32; } /* Closed (100%) - Green */
  .deal-stage.contractissued90 { background: #fff3e0; color: #e65100; } /* Contract Issued (90%) - Orange */
  .deal-stage.termsagreed75 { background: #ffe0b2; color: #e65100; } /* Terms Agreed (75%) - Light Orange */
  .deal-stage.inreview50 { background: #f3e5f5; color: #7b1fa2; } /* In Review (50%) - Purple */
  .deal-stage.proposal30 { background: #e1f5fe; color: #01579b; } /* Proposal (30%) - Light Blue */
  .deal-stage.engaged10 { background: #e0f2f1; color: #00695c; } /* Engaged (10%) - Teal */

  /* Backwards compatibility for old stage names - kept for filtering UI */
  .deal-stage.won { background: #e8f5e9; color: #2e7d32; }
  .deal-stage.negotiation { background: #fff3e0; color: #e65100; }
  .deal-stage.closed { background: #e3f2fd; color: #1565c0; }
  .deal-stage.proposal { background: #f3e5f5; color: #7b1fa2; }
  .deal-stage.prospecting { background: #e0f2f1; color: #00695c; }
  .deal-stage.qualification { background: #e8eaf6; color: #283593; }

  /* === RESPONSIVE === */
  @media (max-width: 900px) {
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>

function fmt(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
  return '$' + n.toLocaleString();
}
function fmtFull(n) { return '$' + n.toLocaleString(); }
function pct(n) { return (n * 100).toFixed(1) + '%'; }

  var html = '<!DOCTYPE html><html><head><title>' + itemType + ' ' + id + ' — CerebroCRM</title>';

  html += 'body{font-family:"Segoe UI",Arial,sans-serif;margin:0;background:#f5f6f8;color:#333}';

  html += '.actions{margin-top:20px;padding-top:16px;border-top:1px solid #ddd;text-align:right}';

function getDeals(prop, year) {
  if (year === 'all') return prop.deals;
  return prop.deals.filter(d => d.year === year);
}

// Resolves the "current" target for a property-year:
// latest non-null quarterly revision, falling back to original
function resolveTarget(targetObj) {
  if (!targetObj) return { current: 0, original: 0, revisions: [] };
  const orig = targetObj.original || 0;
  const revKeys = ['q1_revised','q2_revised','q3_revised','q4_revised'];
  const revisions = revKeys.map((k, i) => ({ quarter: 'Q' + (i+1), value: targetObj[k] }));
  let current = orig;
  for (let i = revKeys.length - 1; i >= 0; i--) {
    if (targetObj[revKeys[i]] !== null && targetObj[revKeys[i]] !== undefined) {
      current = targetObj[revKeys[i]];
      break;
    }
  }
  return { current, original: orig, revisions };
}

function getTarget(prop, year) {
  if (year === 'all') {
    let t = 0;
    for (const y of [2025, 2026]) {
      t += resolveTarget(prop.targets[y]).current;
    }
    return t;
  }
  return resolveTarget(prop.targets[year]).current;
}

function getOriginalTarget(prop, year) {
  if (year === 'all') {
    let t = 0;
    for (const y of [2025, 2026]) {
      t += resolveTarget(prop.targets[y]).original;
    }
    return t;
  }
  return resolveTarget(prop.targets[year]).original;
}

function getSales(prop, year) {
  return getDeals(prop, year).filter(d => d.stage === 'Closed (100%)').reduce((s,d) => s + d.value, 0);
}

function getBusinessUnitSales(div, year) {
  return div.properties.reduce((s, p) => s + getSales(p, year), 0);
}

function getBusinessUnitTarget(div, year) {
  return div.properties.reduce((s, p) => s + getTarget(p, year), 0);
}

function getGroupSales(year) {
  return DATA.businessUnits.reduce((s, d) => s + getBusinessUnitSales(d, year), 0);
}

function getGroupTarget(year) {
  return DATA.businessUnits.reduce((s, d) => s + getBusinessUnitTarget(d, year), 0);
}

function getGroupDeals(year) {
  let count = 0;
  DATA.businessUnits.forEach(div => div.properties.forEach(p => {
    count += getDeals(p, year).filter(d => d.stage === 'Closed (100%)').length;
  }));
  return count;
}

// Opportunity pipeline helpers
function getOpportunities(prop, year) {
  if (!prop.opportunities) return [];
  if (year === 'all') return prop.opportunities;
  return prop.opportunities.filter(o => o.year === year);
}

function getPipelineValue(prop, year) {
  return getOpportunities(prop, year).reduce((s, o) => s + o.value, 0);
}

function getWeightedPipeline(prop, year) {
  return getOpportunities(prop, year).reduce((s, o) => s + (o.value * o.probability), 0);
}

function getBusinessUnitPipeline(div, year) {
  return div.properties.reduce((s, p) => s + getPipelineValue(p, year), 0);
}

function getBusinessUnitWeightedPipeline(div, year) {
  return div.properties.reduce((s, p) => s + getWeightedPipeline(p, year), 0);
}

function getGroupPipeline(year) {
  return DATA.businessUnits.reduce((s, d) => s + getBusinessUnitPipeline(d, year), 0);
}

function getGroupWeightedPipeline(year) {
  return DATA.businessUnits.reduce((s, d) => s + getBusinessUnitWeightedPipeline(d, year), 0);
}

function getGroupOpportunityCount(year) {
  let count = 0;
  DATA.businessUnits.forEach(div => div.properties.forEach(p => {
    count += getOpportunities(p, year).length;
  }));
  return count;
}

function attainmentColor(ratio) {
  if (ratio >= 1) return 'var(--tableau-green)';
  if (ratio >= 0.85) return 'var(--tableau-blue)';
  if (ratio >= 0.7) return 'var(--tableau-orange)';
  return 'var(--tableau-red)';
}

function sparklineHTML(prop, year) {
  const quarters = ['q1','q2','q3','q4'];
  let vals = [];
  const years = year === 'all' ? [2025, 2026] : [year];
  years.forEach(y => {
    quarters.forEach(q => {
      const qDeals = prop.deals.filter(d => d.year === y && d.quarter === q.toUpperCase() && d.stage === 'Closed (100%)');
      vals.push(qDeals.reduce((s,d) => s + d.value, 0));
    });
  });
  const max = Math.max(...vals, 1);
  return '<span class="sparkline">' + vals.map(v =>
    `<span class="spark-bar" style="height:${Math.max(2, (v/max)*20)}px"></span>`
  ).join('') + '</span>';
}

function showTooltip(e, html) {
  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('visible');
  const rect = tooltipEl.getBoundingClientRect();
  let x = e.clientX + 12;
  let y = e.clientY + 12;
  if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 12;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 12;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}

function hideTooltip() { tooltipEl.classList.remove('visible'); }

document.addEventListener('mousemove', (e) => {
  if (tooltipEl.classList.contains('visible')) {
    tooltipEl.style.left = (e.clientX + 12) + 'px';
    tooltipEl.style.top = (e.clientY + 12) + 'px';
  }
});

// =============================================
//  NAVIGATION
// =============================================
function setYear(y) {
  currentYear = y;
  document.querySelectorAll('.year-toggle button').forEach(b => b.classList.remove('active'));
  if (y === 'all') document.getElementById('btnAll').classList.add('active');
  else document.getElementById('btn' + y).classList.add('active');
  render();
}

function navigate(view, divId, propId) {
  currentView = view;
  selectedBusinessUnit = divId ? DATA.businessUnits.find(d => d.id === divId) : null;
  selectedProperty = propId && selectedBusinessUnit ? selectedBusinessUnit.properties.find(p => p.id === propId) : null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderBreadcrumbs() {
  const bc = document.getElementById('breadcrumbs');
  let html = '';
  if (currentView === 'group') {
    html = '<span class="breadcrumb-current">Leadership Dashboard</span>';
  } else if (currentView === 'business unit') {
    html = `<span class="breadcrumb-item" onclick="navigate('group')">Group Overview</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${selectedBusinessUnit.name}</span>`;
  } else if (currentView === 'property') {
    html = `<span class="breadcrumb-item" onclick="navigate('group')">Group Overview</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-item" onclick="navigate('business unit','${selectedBusinessUnit.id}')">${selectedBusinessUnit.name}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${selectedProperty.name}</span>`;
  } else if (currentView === 'deals') {
    html = `<span class="breadcrumb-item" onclick="navigate('group')">Group Overview</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-item" onclick="navigate('business unit','${selectedBusinessUnit.id}')">${selectedBusinessUnit.name}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-item" onclick="navigate('property','${selectedBusinessUnit.id}','${selectedProperty.id}')">${selectedProperty.name}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">Deals</span>`;
  }
  bc.innerHTML = html;
}

// =============================================
//  RENDER VIEWS
// =============================================
function render() {
  renderBreadcrumbs();
  const app = document.getElementById('app');
  if (currentView === 'group') renderGroupView(app);
  else if (currentView === 'business unit') renderBusinessUnitView(app);
  else if (currentView === 'property') renderPropertyView(app);
  else if (currentView === 'deals') renderDealsView(app);
}

  // Table
  const tbody = document.getElementById('propTableBody');
  div.properties.forEach((prop, i) => {
    const sales = getSales(prop, y);
    const target = getTarget(prop, y);
    const origTarget = getOriginalTarget(prop, y);
    const variance = sales - target;
    const propAtt = target > 0 ? sales / target : 0;
    const propShare = divSales > 0 ? sales / divSales : 0;
    const wonCount = getDeals(prop, y).filter(d => d.stage === 'Closed (100%)').length;
    const tDelta = target - origTarget;

    tbody.innerHTML += `
      <tr onclick="navigate('property','${div.id}','${prop.id}')"
          onmouseenter="showTooltip(event, '<div class=tt-title>${prop.name}</div><div class=tt-row><span class=tt-label>Category:</span><span class=tt-val>${prop.category}</span></div><div class=tt-row><span class=tt-label>Target Revision:</span><span class=tt-val>${tDelta >= 0 ? "+" : ""}${fmtFull(tDelta)}</span></div><div class=tt-row><span class=tt-label>Avg Deal Size:</span><span class=tt-val>${wonCount>0?fmtFull(Math.round(sales/wonCount)):'N/A'}</span></div>')"
          onmouseleave="hideTooltip()">
        <td><span style="display:inline-block;width:4px;height:16px;background:${COLORS[i]};border-radius:2px;margin-right:8px;vertical-align:middle"></span>${prop.name} <span class="drill-icon">▸</span></td>
        <td>${prop.category}</td>
        <td class="num" style="color:var(--text-muted)">${fmtFull(origTarget)}</td>
        <td class="num">${fmtFull(target)}${tDelta !== 0 ? ' <span style="font-size:10px;color:' + (tDelta > 0 ? 'var(--tableau-green)' : 'var(--tableau-red)') + '">' + (tDelta > 0 ? '▲' : '▼') + '</span>' : ''}</td>
        <td class="num" style="font-weight:600">${fmtFull(sales)}</td>
        <td>
          <div class="attainment-bar">
            <div class="attainment-track"><div class="attainment-fill" style="width:${Math.min(propAtt*100,100)}%;background:${attainmentColor(propAtt)}"></div></div>
            <span class="attainment-pct" style="color:${attainmentColor(propAtt)}">${pct(propAtt)}</span>
          </div>
        </td>
        <td class="num" style="color:${target > sales ? 'var(--tableau-red)' : 'var(--tableau-green)'}; font-weight:600">${fmtFull(Math.max(0, target - sales))}</td>
        <td class="num">${pct(propShare)}</td>
        <td class="num" style="color:var(--tableau-purple)">${fmtFull(getPipelineValue(prop, y))}</td>
        <td class="num">${getOpportunities(prop, y).length}</td>
        <td class="num">${wonCount}</td>
      </tr>
    `;
  });
}

// ---------- LEVEL 3: PROPERTY DETAIL ----------
function renderPropertyView(container) {
  const div = selectedBusinessUnit;
  const prop = selectedProperty;
  const y = currentYear;
  const sales = getSales(prop, y);
  const target = getTarget(prop, y);
  const origTarget = getOriginalTarget(prop, y);
  const att = target > 0 ? sales / target : 0;
  const deals = getDeals(prop, y);
  const wonDeals = deals.filter(d => d.stage === 'Closed (100%)');
  const avgDeal = wonDeals.length > 0 ? sales / wonDeals.length : 0;
  const divSales = getBusinessUnitSales(div, y);
  const propShare = divSales > 0 ? sales / divSales : 0;
  const tDelta = target - origTarget;
  const opps = getOpportunities(prop, y);
  const pipelineVal = getPipelineValue(prop, y);
  const weightedPipeline = getWeightedPipeline(prop, y);

  // Quarterly targets & actuals
  const quarters = ['Q1','Q2','Q3','Q4'];
  const years = y === 'all' ? [2025, 2026] : [y];

  let html = `
    <button class="back-btn" onclick="navigate('business unit','${div.id}')">← Back to ${div.name}</button>

    <div class="kpi-strip">
      <div class="kpi-card">
        <div class="kpi-label">${prop.name} — Closed</div>
        <div class="kpi-value">${fmt(sales)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${pct(propShare)} of ${div.name}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Current Target</div>
        <div class="kpi-value">${fmt(target)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">Original: ${fmt(origTarget)}${tDelta !== 0 ? ' (' + (tDelta > 0 ? '+' : '') + fmt(tDelta) + ')' : ''}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Achieved</div>
        <div class="kpi-value" style="color:${attainmentColor(att)}">${pct(att)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">Variance: ${fmtFull(sales - target)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg Deal Size</div>
        <div class="kpi-value">${fmt(avgDeal)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${wonDeals.length} closed won</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Open Pipeline</div>
        <div class="kpi-value" style="color:var(--tableau-purple)">${fmt(pipelineVal)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${opps.length} opps (wtd: ${fmt(weightedPipeline)})</div>
      </div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Forecasts</div>
        <div id="quarterlyChart"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Closed by Account Owner</div>
        <div id="ownerChart"></div>
      </div>
    </div>

    <div class="data-table-wrapper">
      <div class="data-table-header">
        <span class="table-title">${prop.name} — Top Deals</span>
        <span style="font-size:11px;color:var(--text-muted)">Click to view deal details</span>
      </div>
      <table class="tableau-table">
        <thead>
          <tr>
            <th>Account</th>
            <th>Owner</th>
            <th class="num">Deal Value</th>
            <th>Stage</th>
            <th>Close Date</th>
            <th>Contract Ref</th>
            <th>Quarter</th>
          </tr>
        </thead>
        <tbody id="dealPreviewBody"></tbody>
      </table>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button class="back-btn" style="margin:0" onclick="navigate('deals','${div.id}','${prop.id}')">View All ${deals.length} Deals →</button>
    </div>

    <div class="data-table-wrapper" style="margin-top:20px">
      <div class="data-table-header">
        <span class="table-title">${prop.name} — Pipeline</span>
        <span style="font-size:11px;color:var(--text-muted)">${opps.length} opportunities in pipeline</span>
      </div>
      <table class="tableau-table">
        <thead>
          <tr>
            <th>Account</th>
            <th>Owner</th>
            <th class="num">Value</th>
            <th>Stage</th>
            <th class="num">Probability</th>
            <th class="num">Weighted Value</th>
            <th>Expected Close</th>
            <th>Quarter</th>
          </tr>
        </thead>
        <tbody id="oppTableBody"></tbody>
      </table>
    </div>
  `;
  container.innerHTML = html;

  // Quarterly chart — shows target revision history + cumulative sales
  const qChart = document.getElementById('quarterlyChart');
  let qHTML = '';
  years.forEach(yr => {
    const tObj = prop.targets[yr];
    if (!tObj) return;
    const resolved = resolveTarget(tObj);
    if (years.length > 1) qHTML += `<div style="font-size:10px;font-weight:600;color:#aaa;margin-top:${yr===years[0]?0:12}px;margin-bottom:8px">FY${String(yr).slice(2)}</div>`;

    // Build revision timeline: Original → Q1 → Q2 → Q3 → Q4
    const timeline = [
      { label: 'Original', value: tObj.original, isRevision: false },
      { label: 'Q1 Rev', value: tObj.q1_revised, isRevision: true },
      { label: 'Q2 Rev', value: tObj.q2_revised, isRevision: true },
      { label: 'Q3 Rev', value: tObj.q3_revised, isRevision: true },
      { label: 'Q4 Rev', value: tObj.q4_revised, isRevision: true }
    ];

    // Cumulative sales per quarter
    const cumSales = [];
    let running = 0;
    quarters.forEach(q => {
      running += prop.deals.filter(d => d.year === yr && d.quarter === q && d.stage === 'Closed (100%)').reduce((s,d)=>s+d.value, 0);
      cumSales.push(running);
    });

    // Find max for scale
    const allVals = [tObj.original, ...cumSales, ...timeline.filter(t=>t.value!==null).map(t=>t.value)].filter(Boolean);
    const maxQ = Math.max(...allVals, 1);

    // Target revision waterfall
    qHTML += '<div style="font-size:11px;font-weight:500;color:#555;margin-bottom:6px">Annual Target Revisions</div>';
    let runningTarget = tObj.original;
    timeline.forEach((t, ti) => {
      if (t.isRevision && (t.value === null || t.value === undefined)) return; // skip empty revisions
      const val = t.value;
      const delta = t.isRevision ? val - runningTarget : 0;
      if (t.isRevision) runningTarget = val;
      const isCurrent = val === resolved.current && ti > 0 || (!t.isRevision && resolved.current === tObj.original);
      qHTML += `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"
             onmouseenter="showTooltip(event, '<div class=tt-title>${t.label} — FY${String(yr).slice(2)}</div><div class=tt-row><span class=tt-label>Target:</span><span class=tt-val>${fmtFull(val)}</span></div>${t.isRevision ? '<div class=tt-row><span class=tt-label>Change:</span><span class=tt-val>' + (delta>=0?'+':'') + fmtFull(delta) + '</span></div>' : ''}<div class=tt-row><span class=tt-label>Status:</span><span class=tt-val>${val === resolved.current ? 'Current' : (t.isRevision ? 'Superseded' : 'Original')}</span></div>')"
             onmouseleave="hideTooltip()">
          <span style="width:60px;font-size:11px;font-weight:${val===resolved.current?'700':'500'};color:${val===resolved.current?'var(--tableau-blue)':'#888'}">${t.label}</span>
          <div style="flex:1;position:relative;height:22px;background:#edf0f4;border-radius:2px">
            <div style="height:100%;width:${(val/maxQ*100).toFixed(1)}%;background:${val===resolved.current?'var(--tableau-orange)':'#ccc'};border-radius:2px;opacity:${val===resolved.current?1:0.5}"></div>
          </div>
          <span style="font-size:12px;font-weight:600;width:70px;text-align:right">${fmt(val)}</span>
          ${t.isRevision ? '<span style="font-size:10px;width:55px;text-align:right;color:' + (delta>=0?'var(--tableau-green)':'var(--tableau-red)') + '">' + (delta>=0?'+':'') + fmt(delta) + '</span>' : '<span style="width:55px"></span>'}
        </div>
      `;
    });

    // Cumulative sales by quarter
    qHTML += '<div style="font-size:11px;font-weight:500;color:#555;margin-top:14px;margin-bottom:6px">Cumulative Sales vs Current Target</div>';
    quarters.forEach((q, qi) => {
      const cs = cumSales[qi];
      const csAtt = resolved.current > 0 ? cs / resolved.current : 0;
      qHTML += `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"
             onmouseenter="showTooltip(event, '<div class=tt-title>Through ${q} FY${String(yr).slice(2)}</div><div class=tt-row><span class=tt-label>Cumulative Sales:</span><span class=tt-val>${fmtFull(cs)}</span></div><div class=tt-row><span class=tt-label>Current Target:</span><span class=tt-val>${fmtFull(resolved.current)}</span></div><div class=tt-row><span class=tt-label>% of Target:</span><span class=tt-val>${pct(csAtt)}</span></div>')"
             onmouseleave="hideTooltip()">
          <span style="width:60px;font-size:11px;font-weight:600;color:#666">${q}</span>
          <div style="flex:1;position:relative;height:22px;background:#edf0f4;border-radius:2px">
            <div style="height:100%;width:${(cs/maxQ*100).toFixed(1)}%;background:var(--tableau-blue);border-radius:2px"></div>
            <div style="position:absolute;top:0;left:0;height:100%;width:${(resolved.current/maxQ*100).toFixed(1)}%;border-right:2px dashed var(--tableau-orange);z-index:3"></div>
          </div>
          <span style="font-size:12px;font-weight:600;width:70px;text-align:right">${fmt(cs)}</span>
          <span style="font-size:10px;width:55px;text-align:right;color:${attainmentColor(csAtt)}">${pct(csAtt)}</span>
        </div>
      `;
    });
  });
  qHTML += '<div style="display:flex;gap:16px;margin-top:10px;font-size:10px;color:#999"><span>■ <span style="color:var(--tableau-blue)">Cumulative Sales</span></span><span style="color:var(--tableau-orange)">■ Current Target</span><span style="color:#ccc">■ Superseded</span></div>';
  qChart.innerHTML = qHTML;

  // Owner chart
  const ownerChart = document.getElementById('ownerChart');
  const owners = {};
  wonDeals.forEach(d => { owners[d.owner] = (owners[d.owner] || 0) + d.value; });
  const ownerArr = Object.entries(owners).sort((a,b) => b[1]-a[1]);
  const maxOwner = ownerArr.length > 0 ? ownerArr[0][1] : 1;
  let ownerHTML = '';
  ownerArr.forEach(([name, val], i) => {
    ownerHTML += `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"
           onmouseenter="showTooltip(event, '<div class=tt-title>${name}</div><div class=tt-row><span class=tt-label>Total Sales:</span><span class=tt-val>${fmtFull(val)}</span></div><div class=tt-row><span class=tt-label>% of Property:</span><span class=tt-val>${pct(val/sales)}</span></div>')"
           onmouseleave="hideTooltip()">
        <span style="width:100px;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
        <div style="flex:1;height:20px;background:#edf0f4;border-radius:2px">
          <div style="height:100%;width:${(val/maxOwner*100).toFixed(1)}%;background:${COLORS[i]};border-radius:2px"></div>
        </div>
        <span style="font-size:12px;font-weight:600;width:70px;text-align:right">${fmt(val)}</span>
      </div>
    `;
  });
  ownerChart.innerHTML = ownerHTML;

  // Deal preview table (top 5)
  const tbody = document.getElementById('dealPreviewBody');
  const sortedDeals = [...deals].sort((a,b) => b.value - a.value).slice(0, 5);
  sortedDeals.forEach(deal => {
    const stageClass = deal.stage.toLowerCase().replace(/\s+/g, '');
    tbody.innerHTML += `
      <tr onmouseenter="showTooltip(event, '<div class=tt-title>${deal.account}</div><div class=tt-row><span class=tt-label>Deal ID:</span><span class=tt-val>${deal.id}</span></div><div class=tt-row><span class=tt-label>Value:</span><span class=tt-val>${fmtFull(deal.value)}</span></div>')"
          onmouseleave="hideTooltip()">
        <td><a class="deal-id-link" href="#" onclick="event.preventDefault(); openDealDetail('${deal.id}')">${deal.id}<span class="link-arrow">↗</span></a></td>
        <td style="font-weight:500">${deal.account}</td>
        <td>${deal.owner}</td>
        <td class="num" style="font-weight:600">${fmtFull(deal.value)}</td>
        <td><span class="deal-stage ${stageClass}">${deal.stage}</span></td>
        <td>${deal.close_date}</td>
        <td style="font-family:monospace;font-size:11px">${deal.contract || '—'}</td>
        <td>${deal.quarter} ${deal.year}</td>
      </tr>
    `;
  });

  // Opportunities table
  const oppTbody = document.getElementById('oppTableBody');
  const sortedOpps = [...opps].sort((a,b) => b.value - a.value);
  sortedOpps.forEach(opp => {
    const stageClass = opp.stage.toLowerCase().replace(/\s+/g, '');
    oppTbody.innerHTML += `
      <tr onmouseenter="showTooltip(event, '<div class=tt-title>${opp.account}</div><div class=tt-row><span class=tt-label>Value:</span><span class=tt-val>${fmtFull(opp.value)}</span></div><div class=tt-row><span class=tt-label>Weighted:</span><span class=tt-val>${fmtFull(Math.round(opp.value * opp.probability))}</span></div>')"
          onmouseleave="hideTooltip()">
        <td style="font-weight:500">${opp.account}</td>
        <td>${opp.owner}</td>
        <td class="num" style="font-weight:600">${fmtFull(opp.value)}</td>
        <td><span class="deal-stage ${stageClass}">${opp.stage}</span></td>
        <td class="num">${(opp.probability * 100).toFixed(0)}%</td>
        <td class="num">${fmtFull(Math.round(opp.value * opp.probability))}</td>
        <td>${opp.expected_close}</td>
        <td>${opp.quarter} ${opp.year}</td>
      </tr>
    `;
  });
}

// ---------- LEVEL 4: DEALS ----------
function renderDealsView(container) {
  const div = selectedBusinessUnit;
  const prop = selectedProperty;
  const y = currentYear;
  const deals = getDeals(prop, y);
  const wonDeals = deals.filter(d => d.stage === 'Closed (100%)');
  const totalVal = wonDeals.reduce((s,d) => s+d.value, 0);
  const opps = getOpportunities(prop, y);
  const pipelineVal = opps.reduce((s,o) => s + o.value, 0);

  let html = `
    <button class="back-btn" onclick="navigate('property','${div.id}','${prop.id}')">← Back to ${prop.name}</button>

    <div class="kpi-strip">
      <div class="kpi-card">
        <div class="kpi-label">Total Deals</div>
        <div class="kpi-value">${deals.length}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${wonDeals.length} closed won</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Won Value</div>
        <div class="kpi-value">${fmt(totalVal)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${prop.name}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Average Deal Size</div>
        <div class="kpi-value">${wonDeals.length > 0 ? fmt(Math.round(totalVal / wonDeals.length)) : 'N/A'}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">Won deals only</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Largest Deal</div>
        <div class="kpi-value">${deals.length > 0 ? fmt(Math.max(...deals.map(d=>d.value))) : 'N/A'}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${deals.length > 0 ? deals.reduce((a,b) => a.value > b.value ? a : b).account : ''}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Open Pipeline</div>
        <div class="kpi-value" style="color:var(--tableau-purple)">${fmt(pipelineVal)}</div>
        <div class="kpi-compare" style="color:var(--text-muted)">${opps.length} opportunities</div>
      </div>
    </div>

    <div class="filter-bar" id="dealFilters">
      <span class="filter-label">Stage:</span>
      <div class="filter-pill active" data-filter="all" onclick="filterDeals('all', this)">All</div>
      <div class="filter-pill" data-filter="Closed (100%)" onclick="filterDeals('Closed (100%)', this)">Closed (100%)</div>
      <div class="filter-pill" data-filter="Contract Issued (90%)" onclick="filterDeals('Contract Issued (90%)', this)">Contract Issued (90%)</div>
      <div class="filter-pill" data-filter="Terms Agreed (75%)" onclick="filterDeals('Terms Agreed (75%)', this)">Terms Agreed (75%)</div>
    </div>

    <div class="data-table-wrapper">
      <div class="data-table-header">
        <span class="table-title">${prop.name} — All Deals</span>
        <span style="font-size:11px;color:var(--text-muted)" id="dealCount">${deals.length} deals</span>
      </div>
      <table class="tableau-table">
        <thead>
          <tr>
            <th>Deal ID</th>
            <th>Account</th>
            <th>Owner</th>
            <th class="num">Deal Value</th>
            <th>Stage</th>
            <th>Close Date</th>
            <th>Contract Ref</th>
            <th>Quarter</th>
            <th>Year</th>
          </tr>
        </thead>
        <tbody id="allDealsBody"></tbody>
      </table>
    </div>

    <div class="data-table-wrapper" style="margin-top:24px">
      <div class="data-table-header">
        <span class="table-title">Pipeline by Stage</span>
        <span style="font-size:11px;color:var(--text-muted)">${opps.length} open opportunities — ${fmt(pipelineVal)} total pipeline</span>
      </div>
      <table class="tableau-table">
        <thead>
          <tr>
            <th>Opp ID</th>
            <th>Account</th>
            <th>Owner</th>
            <th class="num">Value</th>
            <th>Stage</th>
            <th class="num">Probability</th>
            <th class="num">Weighted Value</th>
            <th>Expected Close</th>
            <th>Quarter</th>
            <th>Year</th>
          </tr>
        </thead>
        <tbody id="allOppsBody"></tbody>
      </table>
    </div>

    <div class="data-table-wrapper" style="margin-top:24px">
      <div class="data-table-header">
        <span class="table-title">Pipeline Summary by Stage</span>
      </div>
      <table class="tableau-table">
        <thead>
          <tr>
            <th>Stage</th>
            <th class="num">Count</th>
            <th class="num">Total Value</th>
            <th class="num">Weighted Value</th>
            <th class="num">Avg Deal Size</th>
            <th style="min-width:140px">Distribution</th>
          </tr>
        </thead>
        <tbody id="stageSummaryBody"></tbody>
      </table>
    </div>
  `;
  container.innerHTML = html;

  renderDealsTable(deals);

  // Open opportunities table
  const oppTbody = document.getElementById('allOppsBody');
  const stageOrder = ['Engaged (10%)', 'Proposal (30%)', 'In Review (50%)', 'Terms Agreed (75%)'];
  const sortedOpps = [...opps].sort((a,b) => {
    const si = stageOrder.indexOf(a.stage) - stageOrder.indexOf(b.stage);
    return si !== 0 ? si : b.value - a.value;
  });
  sortedOpps.forEach(opp => {
    const stageClass = opp.stage.toLowerCase().replace(/\s+/g, '');
    oppTbody.innerHTML += `
      <tr>
        <td><a class="deal-id-link" href="#" onclick="event.preventDefault(); openDealDetail('${opp.id}')">${opp.id}<span class="link-arrow">↗</span></a></td>
        <td style="font-weight:500">${opp.account}</td>
        <td>${opp.owner}</td>
        <td class="num" style="font-weight:600">${fmtFull(opp.value)}</td>
        <td><span class="deal-stage ${stageClass}">${opp.stage}</span></td>
        <td class="num">${(opp.probability * 100).toFixed(0)}%</td>
        <td class="num">${fmtFull(Math.round(opp.value * opp.probability))}</td>
        <td>${opp.expected_close}</td>
        <td>${opp.quarter}</td>
        <td>${opp.year}</td>
      </tr>
    `;
  });

  // Stage summary table
  const stageTbody = document.getElementById('stageSummaryBody');
  stageOrder.forEach(stage => {
    const stageOpps = opps.filter(o => o.stage === stage);
    if (stageOpps.length === 0) return;
    const totalV = stageOpps.reduce((s,o) => s + o.value, 0);
    const weightedV = stageOpps.reduce((s,o) => s + o.value * o.probability, 0);
    const avgV = totalV / stageOpps.length;
    const sharePct = pipelineVal > 0 ? (totalV / pipelineVal * 100) : 0;
    const stageClass = stage.toLowerCase().replace(/\s+/g, '');
    stageTbody.innerHTML += `
      <tr>
        <td><span class="deal-stage ${stageClass}">${stage}</span></td>
        <td class="num">${stageOpps.length}</td>
        <td class="num" style="font-weight:600">${fmtFull(totalV)}</td>
        <td class="num">${fmtFull(Math.round(weightedV))}</td>
        <td class="num">${fmtFull(Math.round(avgV))}</td>
        <td>
          <div class="attainment-bar">
            <div class="attainment-track"><div class="attainment-fill" style="width:${sharePct}%;background:var(--tableau-purple)"></div></div>
            <span class="attainment-pct">${sharePct.toFixed(1)}%</span>
          </div>
        </td>
      </tr>
    `;
  });
}

let currentFilter = 'all';
function filterDeals(stage, el) {
  currentFilter = stage;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const prop = selectedProperty;
  const y = currentYear;
  let deals = getDeals(prop, y);
  if (stage !== 'all') deals = deals.filter(d => d.stage === stage);
  renderDealsTable(deals);
  document.getElementById('dealCount').textContent = deals.length + ' deals';
}

function renderDealsTable(deals) {
  const tbody = document.getElementById('allDealsBody');
  tbody.innerHTML = '';
  const sorted = [...deals].sort((a,b) => new Date(b.close_date) - new Date(a.close_date));
  sorted.forEach(deal => {
    const stageClass = deal.stage.toLowerCase().replace(/\s+/g, '');
    tbody.innerHTML += `
      <tr onmouseenter="showTooltip(event, '<div class=tt-title>${deal.account}</div><div class=tt-row><span class=tt-label>Deal ID:</span><span class=tt-val>${deal.id}</span></div><div class=tt-row><span class=tt-label>Owner:</span><span class=tt-val>${deal.owner}</span></div><div class=tt-row><span class=tt-label>Value:</span><span class=tt-val>${fmtFull(deal.value)}</span></div><div class=tt-row><span class=tt-label>Stage:</span><span class=tt-val>${deal.stage}</span></div>')"
          onmouseleave="hideTooltip()">
        <td><a class="deal-id-link" href="#" onclick="event.preventDefault(); openDealDetail('${deal.id}')">${deal.id}<span class="link-arrow">↗</span></a></td>
        <td style="font-weight:500">${deal.account}</td>
        <td>${deal.owner}</td>
        <td class="num" style="font-weight:600">${fmtFull(deal.value)}</td>
        <td><span class="deal-stage ${stageClass}">${deal.stage}</span></td>
        <td>${deal.close_date}</td>
        <td style="font-family:monospace;font-size:11px">${deal.contract || '—'}</td>
        <td>${deal.quarter}</td>
        <td>${deal.year}</td>
      </tr>
    `;
  });
}

// =============================================
//  INIT
// =============================================
render();
</script>
